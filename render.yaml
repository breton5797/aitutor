services:
  - type: web
    name: aitutor-api
    env: node
    plan: free
    region: singapore # 가장 한국과 가까운 리전
    buildCommand: npm install && npx turbo run build --filter=api && cd apps/api && npx prisma generate && npx prisma db push
    startCommand: cd apps/api && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aitutor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        value: "sk_test_placeholder" # 나중에 Stripe 대시보드에서 받은 값으로 교체하세요
      - key: STRIPE_WEBHOOK_SECRET
        value: "whsec_placeholder"
      - key: FRONTEND_URL
        value: "https://your-vercel-frontend.vercel.app" # 프론트엔드 배포 완료 후 도메인으로 교체
      - key: NODE_ENV
        value: "production"

databases:
  - name: aitutor-db
    plan: free
    region: singapore
    databaseName: aitutor
    user: aitutor_user
